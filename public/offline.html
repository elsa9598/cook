<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#006241" />
    <title>요리잼뱅이 오프라인</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f2f0eb;
        color: rgba(0, 0, 0, 0.87);
        font-family: Inter, "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      }

      main {
        max-width: 360px;
        padding: 24px;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 0 0.5px rgba(0, 0, 0, 0.14), 0 1px 1px rgba(0, 0, 0, 0.24);
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #006241;
        font-size: 24px;
      }

      p {
        color: rgba(0, 0, 0, 0.58);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 보관 중</h1>
      <p>요리잼뱅이는 설치 후 기본 화면을 오프라인에서도 열 수 있어요. 인터넷이 돌아오면 다시 추천을 이어가세요.</p>
    </main>
  </body>
</html>
